name: CI

on:
  push:
    branches: [main, wasm-islands]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          # ~1.13.0-0 admits prereleases (rc) until 1.13.0 final lands
          - '~1.13.0-0'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      # docs/Project.toml [sources] points at ../../WasmMakie.jl and
      # ../../WasmTarget.jl — replicate the local sibling layout
      - uses: actions/checkout@v4
        with:
          path: Therapy.jl

      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/WasmMakie.jl
          path: WasmMakie.jl

      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/WasmTarget.jl
          path: WasmTarget.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: Therapy.jl
        run: |
          npm install
          npx playwright install chromium

      - name: Install Julia dependencies
        working-directory: Therapy.jl
        env:
          # Bypass the pkg-server snapshot cache — resolve against General's
          # git state directly so fresh releases (WasmTarget 0.3.1) are
          # visible immediately instead of after CDN propagation.
          JULIA_PKG_SERVER: ""
        run: |
          julia --project=. -e '
            using Pkg
            # Force a FRESH General registry. A cached ~/.julia/registries/General
            # goes stale (only knew WasmTarget up to 0.3.1), and update() can fail
            # to rebase on origin/master; rm + add re-clones it with the current
            # releases so pinned compat bounds (WasmTarget 0.3.9) resolve.
            try; Pkg.Registry.rm("General"); catch; end
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Install docs dependencies
        working-directory: Therapy.jl
        env:
          JULIA_PKG_SERVER: ""
        run: |
          julia --project=docs -e '
            using Pkg
            # Force a FRESH General registry. A cached ~/.julia/registries/General
            # goes stale (only knew WasmTarget up to 0.3.1), and update() can fail
            # to rebase on origin/master; rm + add re-clones it with the current
            # releases so pinned compat bounds (WasmTarget 0.3.9) resolve.
            try; Pkg.Registry.rm("General"); catch; end
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Build docs site (required for E2E tests)
        working-directory: Therapy.jl
        run: |
          julia --project=docs --optimize=3 docs/app.jl build

      - name: Run tests (Julia + Playwright E2E)
        working-directory: Therapy.jl
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'

name: CI

on:
  push:
    branches: [main, wasm-islands]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          # ~1.13.0-0 admits prereleases (rc) until 1.13.0 final lands
          - '~1.13.0-0'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install
          npx playwright install chromium

      - name: Install Julia dependencies
        env:
          # Bypass the pkg-server snapshot cache — resolve against General's
          # git state directly so fresh releases (WasmTarget 0.3.1) are
          # visible immediately instead of after CDN propagation.
          JULIA_PKG_SERVER: ""
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Install docs dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Build docs site (required for E2E tests)
        run: |
          julia --project=docs --optimize=3 docs/app.jl build

      - name: Run tests (Julia + Playwright E2E)
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'

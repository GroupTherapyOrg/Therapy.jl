name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop(url="https://github.com/GroupTherapyOrg/JavaScriptTarget.jl.git")
            Pkg.instantiate()
          '

      - name: Run tests
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
